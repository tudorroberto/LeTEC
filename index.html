<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Ticket</title>
    <meta name="theme-color" content="#FDF4E9">
    <meta name="color-scheme" content="light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
    <div class="mobile-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="tickets.html" style="display: flex; align-items: center; color: inherit; text-decoration: none; -webkit-tap-highlight-color: transparent;">
                    <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </a>
                <h1>Active ticket</h1>
            </div>
            <div class="header-right chat-icon">
                <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 8C7 6.895 7.895 6 9 6H17C18.105 6 19 6.895 19 8V14C19 15.105 18.105 16 17 16H10L6 19V9C6 8.448 6.448 8 7 8Z" fill="#000000"/>
                    <path d="M13 12C13 10.895 13.895 10 15 10H23C24.105 10 25 10.895 25 12V18C25 19.105 24.105 20 23 20H16L12 23V13C12 12.448 12.448 12 13 12Z" fill="#000000"/>
                    <!-- Right question mark matches the bg color -->
                    <text x="18.5" y="17.5" fill="#FFC000" font-family="Inter, sans-serif" font-size="10" font-weight="900" text-anchor="middle">?</text>
                </svg>
            </div>
        </header>
        
        <div class="carousel-container" id="carousel">
            <!-- PAGE 1 (New layout) -->
            <div class="page" id="page-1">
                <div class="top-card card split-card">
                    <div class="split-text">Are you changing<br>transport services?</div>
                    <button class="activate-btn">Activate</button>
                </div>
                <div class="middle-section">
                    <div class="illustration-bg-page1">
                        <svg class="page1-svg" width="100%" height="100%" viewBox="0 0 350 450" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
                            <!-- Window behind -->
                            <rect x="-20" y="200" width="220" height="150" rx="12" fill="#FFFFFF" fill-opacity="0.8"/>
                            
                            <!-- Trees in Window (Beige #F6E2CD) -->
                            <!-- Tree 1 -->
                            <rect x="75" y="270" width="10" height="80" fill="#F6E2CD"/>
                            <circle cx="80" cy="270" r="35" fill="#F6E2CD"/>
                            <!-- Tree 2 -->
                            <rect x="145" y="300" width="6" height="50" fill="#F6E2CD"/>
                            <circle cx="148" cy="300" r="25" fill="#F6E2CD"/>
                            <!-- Small Hill/Ground -->
                            <rect x="-20" y="340" width="220" height="10" fill="#F6E2CD"/>
                            <!-- Faint background mountain -->
                            <path d="M0 340 Q 80 230 160 340 Z" fill="#F6E2CD" fill-opacity="0.5"/>

                            <!-- Slanted Seat on left -->
                            <path d="M 0 330 L 30 460 L 70 460 L 40 330 Z" fill="#E2C199"/>

                            <!-- Horizontal Bar -->
                            <rect x="20" y="110" width="310" height="4" fill="#E2C199"/>
                            
                            <!-- Handles (Triangular with loops) -->
                            <g stroke="#E2C199" stroke-width="3" stroke-linejoin="round" fill="none">
                                <line x1="75" y1="110" x2="80" y2="135" stroke-width="2"/>
                                <path d="M 60 165 L 75 135 L 85 135 L 90 165 Z"/>
                                
                                <line x1="175" y1="110" x2="180" y2="135" stroke-width="2"/>
                                <path d="M 160 165 L 175 135 L 185 135 L 190 165 Z"/>
                                
                                <line x1="295" y1="110" x2="300" y2="135" stroke-width="2"/>
                                <path d="M 280 165 L 295 135 L 305 135 L 310 165 Z"/>
                            </g>

                            <!-- Vertical Yellow Pole -->
                            <rect x="250" y="-50" width="10" height="500" fill="#F7CA18"/>
                            <!-- Red button on pole -->
                            <rect x="247" y="235" width="10" height="18" rx="3" fill="#E67E22"/>
                            <rect x="247" y="240" width="6" height="8" rx="2" fill="#E74C3C"/>

                            <!-- The Man -->
                            <!-- Legs (Orange Pants) -->
                            <!-- Left Leg -->
                            <path d="M 130 360 L 135 450 L 165 450 L 165 360 Z" fill="#FF7200"/>
                            <!-- Right Leg -->
                            <path d="M 165 360 L 170 450 L 200 450 L 190 360 Z" fill="#FF7200"/>
                            <!-- Pants Top -->
                            <path d="M 125 360 L 195 360 L 195 375 L 125 375 Z" fill="#FF7200"/>

                            <!-- Backpack (Dark Navy) -->
                            <path d="M 100 250 Q 80 300 100 350 Q 130 360 140 320 Q 150 240 120 250 Z" fill="#1B2A47"/>
                            
                            <!-- White Shirt Underneath -->
                            <path d="M 130 360 L 190 360 L 185 370 L 155 375 L 130 365 Z" fill="#FFF"/>

                            <!-- Shirt Main Body (Light Blue) -->
                            <path d="M 120 250 Q 160 250 185 260 L 190 360 L 130 360 Z" fill="#B3E5FC"/>

                            <!-- Left Arm down holding phone -->
                            <path d="M 130 250 Q 110 280 120 310 L 145 325 L 155 280 Z" fill="#B3E5FC"/>
                            <path d="M 115 305 L 150 330 L 160 315 L 125 295 Z" fill="#B3E5FC"/> <!-- forearm -->

                            <!-- Phone and Hand -->
                            <!-- Hand -->
                            <circle cx="160" cy="315" r="10" fill="#FFA577"/>
                            <!-- Phone -->
                            <rect x="155" y="295" width="22" height="35" rx="3" fill="#0D1F38" transform="rotate(30 155 295)"/>

                            <!-- Right Arm holding pole -->
                            <!-- Upper Arm -->
                            <path d="M 180 260 Q 210 260 230 275 L 245 295 L 210 300 L 185 280 Z" fill="#B3E5FC"/>
                            <path d="M 230 275 L 260 285 L 255 305 L 225 300 Z" fill="#B3E5FC"/> <!-- forearm extended -->
                            <!-- Right Hand on Pole -->
                            <path d="M 255 280 Q 265 280 270 295 Q 260 305 255 300 Z" fill="#FFA577"/>

                            <!-- Head and Neck -->
                            <!-- Neck -->
                            <rect x="150" y="235" width="14" height="20" fill="#FFA577"/>
                            <!-- Face -->
                            <path d="M 145 235 Q 140 210 155 205 Q 170 210 165 235 Q 155 245 145 235 Z" fill="#FFA577"/>
                            <!-- Hair (Red) -->
                            <path d="M 142 215 Q 140 195 155 195 Q 170 195 168 215 Q 165 200 155 200 Q 145 200 142 215 Z" fill="#FF2A00"/>
                            <path d="M 145 198 Q 155 185 165 198 C 175 190 180 205 170 210 Q 165 195 155 195 Q 145 198 145 198 Z" fill="#FF2A00"/>
                            <circle cx="145" cy="215" r="4" fill="#FF2A00"/> <!-- Side burn -->

                            <!-- Backpack Strap -->
                            <path d="M 135 250 Q 120 280 130 360" fill="none" stroke="#1B2A47" stroke-width="8"/>
                        </svg>
                    </div>
                </div>
                
                <div class="bottom-card card">
                    <h2 class="journey">1 journey AIRPORT BSCA</h2>
                    <div class="traveller">1 traveller</div>
                    <div class="validation-text">This ticket is valid until</div>
                    <div class="timer" id="valid-until-timer">16:02:13</div>
                </div>
            </div>

            <!-- PAGE 2 (Old layout, QR Code) -->
            <div class="page" id="page-2">
                <div class="top-card card">
                    <div class="time-display" id="time-display">14:32:55</div>
                    <div class="boarding-area">Boarding area: 07102</div>
                </div>
                
                <div class="middle-section">
                    <div class="illustration-bg"></div>
                    <div class="qr-wrapper">
                        <div class="qr-frame">
                            <img class="qr-code-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=VeryLongComplexTicketDataString1234567890-ABCDEFGHIJKLM-NOPQRSTUVWXYZ-9876543210-ComplexMatrixRequired" alt="QR Code">
                            <div class="qr-text">Show this QR code to the<br>inspector</div>
                        </div>
                    </div>
                </div>
                
                <div class="bottom-card card">
                    <h2 class="journey">1 journey AIRPORT BSCA</h2>
                    <div class="traveller">1 traveller</div>
                    <div class="validation-text">This ticket has been validated since</div>
                    <div class="timer" id="timer">00:00:01</div>
                </div>
            </div>
        </div>
        
        <div class="indicators">
            <span class="dot grey" id="dot1"></span>
            <span class="dot yellow" id="dot2"></span>
        </div>
    </div>
    
    <script src="script.js?v=13"></script>
</body>
</html>
